name: Send booking reminders

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: booking-reminders
  cancel-in-progress: false

jobs:
  trigger-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate scheduler configuration
        env:
          REMINDER_CRON_SECRET: ${{ secrets.REMINDER_CRON_SECRET }}
          REMINDER_CRON_URL: ${{ vars.REMINDER_CRON_URL }}
        run: |
          if [ -z "$REMINDER_CRON_SECRET" ]; then
            echo "Missing GitHub secret REMINDER_CRON_SECRET."
            exit 1
          fi

          if [ -z "$REMINDER_CRON_URL" ]; then
            echo "REMINDER_CRON_URL not set. Using default production URL."
          fi

      - name: Trigger production reminder job
        env:
          REMINDER_CRON_SECRET: ${{ secrets.REMINDER_CRON_SECRET }}
          REMINDER_CRON_URL: ${{ vars.REMINDER_CRON_URL }}
        run: |
          URL="${REMINDER_CRON_URL:-https://buk-next.vercel.app/api/cron/send-reminders}"
          curl --fail-with-body --silent --show-error \
            -H "x-cron-secret: $REMINDER_CRON_SECRET" \
            "${URL}?start=25&end=35"
