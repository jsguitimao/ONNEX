name: Send reminders

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: send-reminders
  cancel-in-progress: false

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call reminder cron endpoint
        env:
          REMINDER_CRON_URL: ${{ vars.REMINDER_CRON_URL || 'https://www.onnex.pt/api/cron/send-reminders' }}
          REMINDER_CRON_SECRET: ${{ secrets.REMINDER_CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${REMINDER_CRON_SECRET}" ]; then
            echo "REMINDER_CRON_SECRET is required" >&2
            exit 1
          fi

          curl --fail --show-error --silent \
            --request POST \
            --header "x-cron-secret: ${REMINDER_CRON_SECRET}" \
            --header "user-agent: onnex-github-reminder-cron" \
            "${REMINDER_CRON_URL}"
